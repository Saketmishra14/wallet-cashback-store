name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Check for security vulnerabilities
        working-directory: backend
        run: npm audit --audit-level=moderate || true
      
      - name: Lint code
        working-directory: backend
        run: npm run lint || echo "No lint script defined"
      
      - name: Validate package.json
        working-directory: backend
        run: cat package.json | jq . > /dev/null

  build-check:
    runs-on: ubuntu-latest
    needs: test-and-lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Verify server can be required
        working-directory: backend
        run: node -e "require('./server.js'); console.log('Server module loaded successfully')" || echo "Warning: Server requires MongoDB connection"

  deploy:
    runs-on: ubuntu-latest
    needs: build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl --request POST --url "$RENDER_DEPLOY_HOOK"
            echo "Deployment triggered"
          else
            echo "Warning: RENDER_DEPLOY_HOOK not set"
          fi
